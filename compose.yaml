version: "3.8"
services:
  backup:
    image: frooko/duplicity-backup:latest
    restart: unless-stopped
    volumes:
      - /opt/stacks:/source/stacks
      - /opt/dockge:/source/dockge
      - ./cache:/root/.cache
    env_file:
      - .env
    environment:
      # Optional: override built-in exclude patterns (whitespace/newline separated).
      # Leave unset to use defaults baked into backup.sh.
      BACKUP_EXCLUDES: |
        **/.*
        /source/stacks/jellyfin/config/data/metadata
        /source/stacks/adwireguard/adguard/opt-adguard-work/data/querylog.json*
