version: "3.8"
services:
  backup:
    image: ghcr.io/michalghomelab/duplicity-backup:latest
    restart: unless-stopped
    volumes:
      - /opt/stacks:/source/stacks
      - /opt/dockge:/source/dockge
      - ./cache:/root/.cache
    env_file:
      - .env
    environment:
      # Optional: override built-in include/exclude patterns (whitespace/newline separated).
      # Leave unset to use defaults baked into backup.sh.
      BACKUP_INCLUDES: |
        /source/**/.storage
        /source/**/.storage/**
      BACKUP_EXCLUDES: |
        /source/**/.*
        /source/stacks/jellyfin/config/data/metadata
        /source/stacks/adwireguard/adguard/opt-adguard-work/data/querylog.json*
      BACKUP_FINAL_INCLUDES: |
        /source/**
